name: Release Binary

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install build dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-build.txt

      - name: Build binary
        run: pyinstaller --clean tuiemail.spec

      - name: Archive binary
        run: |
          mkdir -p release
          cp dist/tuiemail release/tuiemail-linux-x86_64

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: tuiemail-linux-x86_64
          path: release/tuiemail-linux-x86_64

      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/tuiemail-linux-x86_64

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install build dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-build.txt

      - name: Build binary
        run: pyinstaller --clean tuiemail.spec

      - name: Archive binary
        run: |
          New-Item -ItemType Directory -Force -Path release
          Copy-Item -Path .\dist\tuiemail.exe -Destination .\release\tuiemail-windows-x86_64.exe

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: tuiemail-windows-x86_64
          path: release/tuiemail-windows-x86_64.exe

      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/tuiemail-windows-x86_64.exe